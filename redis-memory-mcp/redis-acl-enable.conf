# Loaded by redis-stack-server as /redis-stack.conf when the ACL overlay is
# active (docker-compose.acl.yaml). Its only job is to point Redis at the ACL
# users file; the base docker-compose.yaml's REDIS_ARGS (persistence tuning)
# still applies on top, so nothing here duplicates it. Modules load
# independently of this file.
aclfile /etc/redis/users.acl
